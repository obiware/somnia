<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Somnia</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { touch-action: none; }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
     
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: flex-end;
      padding: 14px 14px 0;
      z-index: 20;
      pointer-events: none;
    }

    #soundBtn {
      pointer-events: all;
      width: 44px; height: 44px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    #soundBtn:active { background: rgba(80, 100, 200, 0.4); }

    /* ── Start overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 60, 114, 0.93);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 30;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #overlay h2 {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 200;
      font-size: clamp(2rem, 8vw, 2.8rem);
      color: #d0dcff;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(120, 140, 255, 0.5);
    }

    .pulse-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(90, 110, 220, 0.25);
      border: 1px solid rgba(120, 150, 255, 0.45);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 0.65; }
      50%       { transform: scale(1.18); opacity: 1;    }
    }

    #overlay p {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 0.88rem;
      color: rgba(100, 120, 180, 0.85);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="hud">
    <button id="soundBtn" aria-label="Toggle sound">🔇</button>
  </div>

  <div id="overlay">
    <h2>Somnia</h2>
    <div class="pulse-ring"></div>
    <p>Tap anywhere to begin</p>
  </div>

  <script type="module">


  'use strict';
  import { Game, SoundMachine } from './public/js/game.js';
  
  const TOTAL_GAME_TRANSITION_DURATION_SECONDS = 15*60; // 1 minute
  const TICKS_PER_SECOND = 60;
  
  const INTERVAL_TICK_MS = 1000 / TICKS_PER_SECOND; // 60 FPS

  const CONFIG = {
     
      BG_START_COLOR: [ 14, 18, 62], // [35, 60, 114],
      BG_END_COLOR : [1,1,8],
      SHINY_COLOR : [253, 204, 13],
      
      MAX_TICK : TOTAL_GAME_TRANSITION_DURATION_SECONDS * TICKS_PER_SECOND,

      STARS_Y_MAX_SPACE : 0.60, // 33% of the screen height from the top is used to drawing constellation 
      STARS_X_MAX_SPACE : 1, // 33% of the screen width from the left is used to drawing constellation
      
      NB_STARS : 75,

      CONSTELLATION_MAX_LIFETIME_TICKS : 48 * TICKS_PER_SECOND, // 48 seconds 
      CONSTELLATION_PATH_DURATION_TICKS : TICKS_PER_SECOND * 3, // speed of the constellation movement (in percentage of the screen width per tick)
      
      PLAYER_Y_POSITION : 0.88, // 92% of the screen height from the top is used to drawing player   
      PLAYER_X_SLOTS : [0.14, 0.375, 0.625, 0.86], // 4 slots for the player to move horizontally
      PLAYER_RADIUS : 28, //pixels
      PLAYER_LIFETIME_SUCCESS_TICKS : 1 * TICKS_PER_SECOND, // 1 second
      PLAYER_BOOST_X_MOVE : 4, // multiplier for the drag of the user

      LINE_LIFETIME_SUCCESS_TICKS : 2 * TICKS_PER_SECOND, // 1 second

      COIN_RADIUS : 24,
      COIN_SPEED : 0.0050, // percent by tick , 0.04 means 4% of the screen height per tick
      COIN_INTERVAL_TICKS : 3 * TICKS_PER_SECOND, // ticks between each coin spawn
      COIN_SLOTS : [0.125, 0.375, 0.625, 0.875], // 4 slots for the coins to spawn horizontally
    
      FINAL_COIN_SPEED : 0.00125,
      FINAL_COIN_INTERVAL_TICKS : 10 * TICKS_PER_SECOND, // ticks between each target coin spawn

      AUDIO_FILES: {
        RAIN: 'public/audio/rain_loop.mp3',
        BELL: 'public/audio/tibetan_bell.mp3',
      }
    
    }  

  
  var running = false;
  // ================================================================
  //  Canvas
  // ================================================================
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  const audio = new SoundMachine(CONFIG.AUDIO_FILES);
  
    window.addEventListener('click', () => {
     audio.init();
    }, { once: true });

  const game = new Game(CONFIG, ctx, audio);

  function resizeCanvas() {
    const displayWidth = window.innerWidth;
    const displayHeight = window.innerHeight;

    // 2. On récupère la densité de pixels (souvent 2 ou 3 sur iPhone, 1 sur PC)
    // On peut multiplier par 0.9 ici si tu veux garder exactement ton feeling à 90%
    const dpr = (window.devicePixelRatio || 1) * 0.9; 

    // 3. On donne au Canvas une résolution interne beaucoup plus grande (ultra-net)
    canvas.width = displayWidth * dpr;
    canvas.height = displayHeight * dpr;

    // 4. On force le Canvas à garder sa taille visuelle d'origine en CSS
    canvas.style.width = displayWidth + 'px';
    canvas.style.height = displayHeight + 'px';
    
    // 5. TRÈS IMPORTANT : Si tu utilises cette méthode, tu dois dire au Context 
    // de s'adapter à ce changement d'échelle pour que tes dessins ne soient pas minuscules :
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
  }
  window.addEventListener('resize', resizeCanvas);


  var soundEnabled = false;

  // Sound toggle
  document.getElementById('soundBtn').addEventListener('click', e => {
    e.stopPropagation();
    setSoundEnabled(!soundEnabled);
  });


  function runGame() {
    var tick = 0;
    setInterval(() => {
      if (running) {
        tick++;
        game.run(tick);
      }
    }, INTERVAL_TICK_MS);
  }
  function setSoundEnabled(enabled) {
    soundEnabled = enabled;
    document.getElementById('soundBtn').textContent = enabled ? '🔊' : '🔇';
    audio.setEnableSound(enabled);
    
  }
  // ================================================================
  //  Start overlay
  // ================================================================
  document.getElementById('overlay').addEventListener('click', () => {
    // Request fullscreen (needs user gesture)
    // const el  = document.documentElement;
    // const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    // if (req) req.call(el).catch(() => {});

    document.getElementById('overlay').style.display = 'none';
    running = true;
    runGame();


  }, { once: true });


  // ================================================================
  //  Init
  // ================================================================
  resizeCanvas();


  </script>
</body>
</html>
