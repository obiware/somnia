<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Somnia</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { touch-action: none; }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: flex-end;
      padding: 14px 14px 0;
      z-index: 20;
      pointer-events: none;
    }

    #soundBtn {
      pointer-events: all;
      width: 44px; height: 44px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    #soundBtn:active { background: rgba(80, 100, 200, 0.4); }

    /* ── Start overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 5, 18, 0.93);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 30;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #overlay h2 {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 200;
      font-size: clamp(2rem, 8vw, 2.8rem);
      color: #d0dcff;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(120, 140, 255, 0.5);
    }

    .pulse-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(90, 110, 220, 0.25);
      border: 1px solid rgba(120, 150, 255, 0.45);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 0.65; }
      50%       { transform: scale(1.18); opacity: 1;    }
    }

    #overlay p {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 0.88rem;
      color: rgba(100, 120, 180, 0.85);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="hud">
    <button id="soundBtn" aria-label="Toggle sound">🔇</button>
  </div>

  <div id="overlay">
    <h2>Somnia</h2>
    <div class="pulse-ring"></div>
    <p>Tap anywhere to begin</p>
  </div>

  <script>
  'use strict';

  // ================================================================
  //  CONFIGURATION
  //  All parameters are gathered here — safe to edit freely.
  //  Changing TRANSITION_DURATION rescales all timed transitions.
  // ================================================================
  const CONFIG = {

    // ── Core timing ─────────────────────────────────────────────
    TRANSITION_DURATION: 1200,    // seconds  (20 min → all transitions reach end state)
                                  // The game never stops after this; values stay fixed.

    // ── Vertical layout ─────────────────────────────────────────
    SKY_HEIGHT_FRACTION: 0.35,    // top 35% = star sky, bottom 65% = road

    // ── Road scroll speed (px / second) ─────────────────────────
    SCROLL_SPEED_START:  255,     // at t = 0 (15% slower than previous 300)
    SCROLL_SPEED_END:    75,      // at t = TRANSITION_DURATION

    // ── Gate spawn interval (seconds between gates) ──────────────
    GATE_INTERVAL_START: 2,       // at t = 0  ← easily tunable
    GATE_INTERVAL_END:   8,       // at t = TRANSITION_DURATION

    // ── Gate opening width (fraction of canvas width) ────────────
    GATE_GAP_START: 0.34,         // at t = 0  (reduced gap)
    GATE_GAP_END:   0.15,         // at t = TRANSITION_DURATION (narrow, centred)

    // ── Gate centre X spread (fraction of half-screen offset) ────
    GATE_SPREAD_START: 0.82,      // at t = 0  (far left / right)
    GATE_SPREAD_END:   0.07,      // at t = TRANSITION_DURATION (nearly centred)

    PILLAR_WIDTH:  14,            // px
    PILLAR_HEIGHT: 92,            // px

    // ── Player ───────────────────────────────────────────────────
    PLAYER_RADIUS:     18,        // px
    PLAYER_Y_FRACTION: 0.86,      // lower on screen (about 14% from bottom)

    // ── Constellations ───────────────────────────────────────────
    CONSTELLATION_MAX_STARS:  30, // stars per constellation before cycling
    STAR_FADE_IN_DURATION:   1.5, // seconds — phase-3 star fade-in
    STAR_TWINKLE_DURATION:   0.9, // seconds — strong sparkle right after spawn
    STAR_LIFETIME:           8.0, // seconds — progressive star fade-out
    CONSTELLATION_FADE_OUT:   5,  // seconds — old constellation fades to 5 % opacity

    // ── Audio files (place these in public/audio/) ───────────────
    AUDIO_FILES: {
      RAIN: 'public/audio/rain_loop.mp3',
      BELL: 'public/audio/tibetan_bell.mp3',
    },

    // ── Audio: rain ──────────────────────────────────────────────
    RAIN_FILTER_START: 3200,      // lowpass cutoff Hz at t = 0
    RAIN_FILTER_END:    400,      // lowpass cutoff Hz at t = TRANSITION_DURATION
    RAIN_GAIN_START:    0.24,
    RAIN_GAIN_END:      0.12,

    // ── Audio: bell ──────────────────────────────────────────────
    BELL_GAIN_START:  0.80,
    BELL_GAIN_END:    0.44,
    BELL_RATE_START:  1.00,       // pitch at t = 0
    BELL_RATE_END:    0.72,       // deeper bell pitch as time passes
    BELL_LOWPASS_START: 3200,
    BELL_LOWPASS_END:    900,
    BELL_REVERB_MIX_START: 0.10,
    BELL_REVERB_MIX_END:   0.36,
    BELL_START_OFFSET:     0.0,
    BELL_PLAY_WINDOW:      3.8,
    PAN_CURVE_EXP:    0.65,       // < 1 exaggerates stereo separation near edges

    // ── Haptic phase thresholds (as fraction of TRANSITION_DURATION)
    HAPTIC_PHASE1_FRAC: 2 / 20,   // strong tap until this fraction of total time
    HAPTIC_PHASE2_FRAC: 5 / 20,   // soft tap until this fraction; silent after

    // ── Background colour key-frames [R, G, B] ───────────────────
    // Mapped to progress breakpoints: 0  →  P1  →  P2  →  0.75  →  1.0
    BG_START: [ 18,  8, 38],      // t=0         : warm dusk purple
    BG_P1:    [165, 62, 12],      // progress=0.1: orange dusk peak  (≈ 2 min)
    BG_P2:    [  7, 11, 54],      // progress=0.25: deep night blue  (≈ 5 min)
    BG_P3:    [  3,  5, 21],      // progress=0.75: very dark blue
    BG_END:   [  1,  2,  8],      // progress=1.0 : near-black blue
  };

  // ── Phase breakpoints in progress-space (derived, don't edit) ──
  const P1 = 2  / 20;   // 0.100
  const P2 = 5  / 20;   // 0.250
  const P3 = 15 / 20;   // 0.750

  // ── Haptic thresholds in absolute seconds ───────────────────────
  const HAPTIC_END1 = CONFIG.TRANSITION_DURATION * CONFIG.HAPTIC_PHASE1_FRAC;
  const HAPTIC_END2 = CONFIG.TRANSITION_DURATION * CONFIG.HAPTIC_PHASE2_FRAC;


  // ================================================================
  //  Canvas
  // ================================================================
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    player.x = canvas.width / 2;
  }
  window.addEventListener('resize', resizeCanvas);


  // ================================================================
  //  Game state
  // ================================================================
  let running       = false;
  let timeElapsed   = 0;
  let lastTimestamp = null;
  let soundEnabled  = false;

  let roadOffset        = 0;
  let gates             = [];
  let timeSinceLastGate = 9999;   // trigger first spawn immediately

  // Constellations
  let constellations       = [];
  let currentConstellation = null;


  // ================================================================
  //  Player
  // ================================================================
  const player = {
    x: 0,
    dragging:    false,
    touchId:     null,
    dragOffsetX: 0,
  };


  // ================================================================
  //  Utility helpers
  // ================================================================
  function lerp(a, b, t)       { return a + (b - a) * t; }
  function clamp(v, lo, hi)    { return v < lo ? lo : v > hi ? hi : v; }
  function getProgress()       { return Math.min(timeElapsed / CONFIG.TRANSITION_DURATION, 1); }
  function getRoadTop()        { return canvas.height * CONFIG.SKY_HEIGHT_FRACTION; }
  function getRoadHeight()     { return canvas.height - getRoadTop(); }

  function getScrollSpeed(p)   { return lerp(CONFIG.SCROLL_SPEED_START,   CONFIG.SCROLL_SPEED_END,   p); }
  function getGateInterval(p)  { return lerp(CONFIG.GATE_INTERVAL_START,  CONFIG.GATE_INTERVAL_END,  p); }
  function getGateGap(p)       { return lerp(CONFIG.GATE_GAP_START,       CONFIG.GATE_GAP_END,       p) * canvas.width; }
  function getGateSpread(p)    { return lerp(CONFIG.GATE_SPREAD_START,    CONFIG.GATE_SPREAD_END,    p); }

  function getBgColor(p) {
    let r, g, b;
    if (p < P1) {
      const t = p / P1;
      r = lerp(CONFIG.BG_START[0], CONFIG.BG_P1[0], t);
      g = lerp(CONFIG.BG_START[1], CONFIG.BG_P1[1], t);
      b = lerp(CONFIG.BG_START[2], CONFIG.BG_P1[2], t);
    } else if (p < P2) {
      const t = (p - P1) / (P2 - P1);
      r = lerp(CONFIG.BG_P1[0], CONFIG.BG_P2[0], t);
      g = lerp(CONFIG.BG_P1[1], CONFIG.BG_P2[1], t);
      b = lerp(CONFIG.BG_P1[2], CONFIG.BG_P2[2], t);
    } else if (p < P3) {
      const t = (p - P2) / (P3 - P2);
      r = lerp(CONFIG.BG_P2[0], CONFIG.BG_P3[0], t);
      g = lerp(CONFIG.BG_P2[1], CONFIG.BG_P3[1], t);
      b = lerp(CONFIG.BG_P2[2], CONFIG.BG_P3[2], t);
    } else {
      const t = (p - P3) / (1 - P3);
      r = lerp(CONFIG.BG_P3[0], CONFIG.BG_END[0], t);
      g = lerp(CONFIG.BG_P3[1], CONFIG.BG_END[1], t);
      b = lerp(CONFIG.BG_P3[2], CONFIG.BG_END[2], t);
    }
    return [Math.round(r), Math.round(g), Math.round(b)];
  }


  // ================================================================
  //  Audio (Web Audio API + external files in public/audio)
  // ================================================================
  let audioCtx        = null;
  let rainFilter      = null;
  let rainGain        = null;
  let rainAudioEl     = null;
  let bellAudioEl     = null;
  let bellPanner      = null;
  let bellFilter      = null;
  let bellGain        = null;
  let bellDryGain     = null;
  let bellWetGain     = null;
  let bellConvolver   = null;
  let bellStopTimer   = null;
  let audioRoutingReady = false;
  let audioReady      = false;

  function createImpulseResponse(ctx, durationSec, decay) {
    const length = Math.max(1, Math.floor(ctx.sampleRate * durationSec));
    const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        const t = i / length;
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
      }
    }
    return impulse;
  }

  function initAudio() {
    if (audioReady) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch {
      audioCtx = null;
    }

    rainAudioEl = new Audio(CONFIG.AUDIO_FILES.RAIN);
    rainAudioEl.loop = true;
    rainAudioEl.preload = 'auto';
    rainAudioEl.volume = 1;
    rainAudioEl.playsInline = true;

    bellAudioEl = new Audio(CONFIG.AUDIO_FILES.BELL);
    bellAudioEl.preload = 'auto';
    bellAudioEl.volume = 1;
    bellAudioEl.playsInline = true;

    if (audioCtx) {
      try {
        rainFilter = audioCtx.createBiquadFilter();
        rainFilter.type            = 'lowpass';
        rainFilter.frequency.value = CONFIG.RAIN_FILTER_START;
        rainFilter.Q.value         = 0.7;

        rainGain = audioCtx.createGain();
        rainGain.gain.value = 0;           // start muted; enabled by toggle

        bellConvolver = audioCtx.createConvolver();
        bellConvolver.buffer = createImpulseResponse(audioCtx, 2.8, 3.0);

        bellPanner = audioCtx.createStereoPanner();
        bellFilter = audioCtx.createBiquadFilter();
        bellFilter.type = 'lowpass';
        bellGain = audioCtx.createGain();
        bellDryGain = audioCtx.createGain();
        bellWetGain = audioCtx.createGain();

        const rainSrc = audioCtx.createMediaElementSource(rainAudioEl);
        rainSrc.connect(rainFilter);
        rainFilter.connect(rainGain);
        rainGain.connect(audioCtx.destination);

        const bellSrc = audioCtx.createMediaElementSource(bellAudioEl);
        bellSrc.connect(bellFilter);
        bellFilter.connect(bellGain);
        bellGain.connect(bellDryGain);
        bellGain.connect(bellConvolver);
        bellConvolver.connect(bellWetGain);
        bellDryGain.connect(bellPanner);
        bellWetGain.connect(bellPanner);
        bellPanner.connect(audioCtx.destination);

        audioRoutingReady = true;
      } catch {
        audioRoutingReady = false;
      }
    }

    audioReady = true;
  }

  function setSoundEnabled(enabled) {
    soundEnabled = enabled;
    document.getElementById('soundBtn').textContent = enabled ? '🔊' : '🔇';

    if (enabled && !audioReady) initAudio();
    if (!audioReady) return;

    if (enabled) {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
      if (audioRoutingReady && rainGain && audioCtx) {
        rainGain.gain.setTargetAtTime(CONFIG.RAIN_GAIN_START, audioCtx.currentTime, 0.6);
      } else if (rainAudioEl) {
        rainAudioEl.volume = CONFIG.RAIN_GAIN_START;
      }
      if (rainAudioEl) {
        rainAudioEl.play().catch(() => {});
      }
    } else {
      if (audioRoutingReady && rainGain && audioCtx) {
        rainGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.6);
      } else if (rainAudioEl) {
        rainAudioEl.volume = 0;
      }
      if (rainAudioEl) rainAudioEl.pause();
    }
  }

  function updateRainFilter(p) {
    if (audioRoutingReady && rainFilter && audioCtx) {
      rainFilter.frequency.setValueAtTime(
        lerp(CONFIG.RAIN_FILTER_START, CONFIG.RAIN_FILTER_END, p),
        audioCtx.currentTime
      );
      if (soundEnabled && rainGain) {
        rainGain.gain.setValueAtTime(
          lerp(CONFIG.RAIN_GAIN_START, CONFIG.RAIN_GAIN_END, p),
          audioCtx.currentTime
        );
      }
    } else if (soundEnabled && rainAudioEl) {
      rainAudioEl.volume = lerp(CONFIG.RAIN_GAIN_START, CONFIG.RAIN_GAIN_END, p);
    }
  }

  function playBell(pan, p) {
    if (!bellAudioEl) return;

    const rate = lerp(CONFIG.BELL_RATE_START, CONFIG.BELL_RATE_END, p);
    const wet = lerp(CONFIG.BELL_REVERB_MIX_START, CONFIG.BELL_REVERB_MIX_END, p);

    const maxPlayable = Math.max(0.2, bellAudioEl.duration - CONFIG.BELL_START_OFFSET || CONFIG.BELL_PLAY_WINDOW);
    const playDuration = Math.min(CONFIG.BELL_PLAY_WINDOW, maxPlayable);
    const adjustedDurationMs = (playDuration / Math.max(0.1, rate)) * 1000;

    if (audioRoutingReady && audioCtx && audioCtx.state !== 'suspended' && bellPanner) {
      bellPanner.pan.setValueAtTime(clamp(pan, -1, 1), audioCtx.currentTime);
      bellFilter.frequency.setValueAtTime(
        lerp(CONFIG.BELL_LOWPASS_START, CONFIG.BELL_LOWPASS_END, p),
        audioCtx.currentTime
      );
      bellGain.gain.setValueAtTime(
        lerp(CONFIG.BELL_GAIN_START, CONFIG.BELL_GAIN_END, p),
        audioCtx.currentTime
      );
      bellWetGain.gain.setValueAtTime(wet, audioCtx.currentTime);
      bellDryGain.gain.setValueAtTime(1 - wet * 0.82, audioCtx.currentTime);

      bellAudioEl.pause();
      bellAudioEl.currentTime = CONFIG.BELL_START_OFFSET;
      bellAudioEl.playbackRate = rate;
      bellAudioEl.play().catch(() => {});

      if (bellStopTimer) clearTimeout(bellStopTimer);
      bellStopTimer = setTimeout(() => {
        bellAudioEl.pause();
      }, adjustedDurationMs);
      return;
    }

    const bellShot = new Audio(CONFIG.AUDIO_FILES.BELL);
    bellShot.currentTime = CONFIG.BELL_START_OFFSET;
    bellShot.playbackRate = rate;
    bellShot.volume = Math.min(1, Math.max(0, lerp(CONFIG.BELL_GAIN_START, CONFIG.BELL_GAIN_END, p)));
    bellShot.play().catch(() => {});
    setTimeout(() => {
      bellShot.pause();
    }, adjustedDurationMs);
  }


  // ================================================================
  //  Haptic
  // ================================================================
  function triggerHaptic() {
    if (!navigator.vibrate) return;
    if (timeElapsed < HAPTIC_END1)      navigator.vibrate([40]);
    else if (timeElapsed < HAPTIC_END2) navigator.vibrate([20]);
    // silent after HAPTIC_END2
  }


  // ================================================================
  //  Input — touch (primary) + mouse (desktop fallback)
  // ================================================================
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (player.dragging) return;
    const t = e.changedTouches[0];
    player.dragging    = true;
    player.touchId     = t.identifier;
    player.dragOffsetX = t.clientX - player.x;
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier !== player.touchId) continue;
      player.x = clamp(
        t.clientX - player.dragOffsetX,
        CONFIG.PLAYER_RADIUS,
        canvas.width - CONFIG.PLAYER_RADIUS
      );
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === player.touchId) {
        player.dragging = false;
        player.touchId  = null;
      }
    }
  });

  // Mouse
  let _mdown = false;
  canvas.addEventListener('mousedown', e => {
    _mdown = true;
    player.dragging    = true;
    player.dragOffsetX = e.clientX - player.x;
  });
  canvas.addEventListener('mousemove', e => {
    if (!_mdown) return;
    player.x = clamp(
      e.clientX - player.dragOffsetX,
      CONFIG.PLAYER_RADIUS,
      canvas.width - CONFIG.PLAYER_RADIUS
    );
  });
  window.addEventListener('mouseup', () => { _mdown = false; player.dragging = false; });

  // Sound toggle
  document.getElementById('soundBtn').addEventListener('click', e => {
    e.stopPropagation();
    setSoundEnabled(!soundEnabled);
  });


  // ================================================================
  //  Start overlay
  // ================================================================
  document.getElementById('overlay').addEventListener('click', () => {
    // Request fullscreen (needs user gesture)
    const el  = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
    if (req) req.call(el).catch(() => {});

    // Bootstrap audio context (needs user gesture)
    initAudio();

    document.getElementById('overlay').style.display = 'none';
    running = true;
    requestAnimationFrame(gameLoop);
  }, { once: true });


  // ================================================================
  //  Gate spawning
  // ================================================================
  function spawnGate(p) {
    const halfW   = canvas.width / 2;
    const gapWidth = getGateGap(p);
    const spread  = getGateSpread(p);

    const idealMin = halfW - halfW * spread;
    const idealMax = halfW + halfW * spread;
    const sideMargin = CONFIG.PILLAR_WIDTH + gapWidth / 2 + 8;
    const spawnMin = Math.max(sideMargin, idealMin);
    const spawnMax = Math.min(canvas.width - sideMargin, idealMax);
    const centerX = spawnMin < spawnMax
      ? lerp(spawnMin, spawnMax, Math.random())
      : halfW;

    gates.push({
      x:        centerX,
      y:        getRoadTop() - CONFIG.PILLAR_HEIGHT - 8,
      gapWidth,
      panMinX:  spawnMin,
      panMaxX:  spawnMax,
      checked:  false,
    });
  }


  // ================================================================
  //  Constellation system
  // ================================================================
  function startNewConstellation() {
    const c = { stars: [], lines: [], opacity: 1, fading: false, fadeTimer: 0 };
    constellations.push(c);
    currentConstellation = c;
  }

  function addStar(gateX) {
    const p     = getProgress();
    const phase = p < P1 ? 1 : p < P2 ? 2 : 3;

    if (!currentConstellation ||
        currentConstellation.stars.length >= CONFIG.CONSTELLATION_MAX_STARS) {
      if (currentConstellation) currentConstellation.fading = true;
      startNewConstellation();
    }

    const star = {
      x:       0.05 * canvas.width + Math.random() * 0.90 * canvas.width,
      y:       0.06 * getRoadTop() + Math.random() * 0.86 * getRoadTop(),
      phase,
      age:     0,
      seed:    Math.random() * Math.PI * 2,
    };

    const prev = currentConstellation.stars[currentConstellation.stars.length - 1];
    if (prev) {
      currentConstellation.lines.push({
        x1: prev.x, y1: prev.y,
        x2: star.x, y2: star.y,
        phase,
      });
    }
    currentConstellation.stars.push(star);
  }


  // ================================================================
  //  Draw: sky + constellations
  // ================================================================
  function drawSky(dt, p) {
    const roadTop = getRoadTop();
    const [r, g, b] = getBgColor(p);
    ctx.fillStyle = 'rgb(2,3,10)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const skyGrad = ctx.createLinearGradient(0, 0, 0, roadTop);
    skyGrad.addColorStop(0, `rgb(${Math.min(255, r + 18)},${Math.min(255, g + 24)},${Math.min(255, b + 30)})`);
    skyGrad.addColorStop(1, `rgb(${r},${g},${b})`);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, roadTop);

    ctx.fillStyle = 'rgba(150,180,255,0.06)';
    ctx.fillRect(0, roadTop - 2, canvas.width, 2);

    // Advance fade timers
    for (const c of constellations) {
      if (c.fading) {
        c.fadeTimer += dt;
        c.opacity = Math.max(0.05, 1 - (c.fadeTimer / CONFIG.CONSTELLATION_FADE_OUT) * 0.95);
      }
    }

    // Draw constellations in sky area only
    for (const c of constellations) {
      if (c.opacity <= 0) continue;
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, canvas.width, roadTop);
      ctx.clip();
      ctx.globalAlpha = c.opacity;
      _drawConstellation(c, dt);
      ctx.restore();
    }
  }

  function _drawConstellation(c, dt) {
    // Lines
    for (const ln of c.lines) {
      ctx.beginPath();
      ctx.moveTo(ln.x1, ln.y1);
      ctx.lineTo(ln.x2, ln.y2);
      if (ln.phase === 1) {
        ctx.strokeStyle = 'rgba(255, 235, 150, 0.6)';
        ctx.lineWidth   = 1;
        ctx.shadowBlur  = 0;
      } else if (ln.phase === 2) {
        ctx.strokeStyle = 'rgba(155, 185, 255, 0.22)';
        ctx.lineWidth   = 2;
        ctx.shadowBlur  = 9;
        ctx.shadowColor = 'rgba(130, 165, 255, 0.28)';
      } else {
        ctx.strokeStyle = 'rgba(130, 140, 210, 0.10)';
        ctx.lineWidth   = 1;
        ctx.shadowBlur  = 0;
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Stars
    for (const s of c.stars) {
      s.age += dt;

      let alpha;
      if (s.age < CONFIG.STAR_TWINKLE_DURATION) {
        alpha = 0.55 + 0.45 * Math.abs(Math.sin(s.age * 38 + s.seed));
      } else {
        const fadeT = (s.age - CONFIG.STAR_TWINKLE_DURATION) / CONFIG.STAR_LIFETIME;
        alpha = Math.max(0, 1 - fadeT);
      }

      if (s.phase === 3) {
        alpha *= Math.min(1, s.age / CONFIG.STAR_FADE_IN_DURATION) * 0.62;
      }

      ctx.save();
      ctx.globalAlpha *= alpha;

      if (s.phase === 1) {
        ctx.shadowBlur  = 10;
        ctx.shadowColor = '#ffcc44';
        ctx.fillStyle   = '#ffe880';
        ctx.beginPath();
        ctx.arc(s.x, s.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      } else if (s.phase === 2) {
        const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 9);
        g.addColorStop(0, 'rgba(175, 200, 255, 0.9)');
        g.addColorStop(1, 'rgba(75,  100, 210, 0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 9, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.shadowBlur  = 5;
        ctx.shadowColor = 'rgba(155, 145, 225, 0.4)';
        ctx.fillStyle   = 'rgba(155, 145, 225, 0.75)';
        ctx.beginPath();
        ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }


  // ================================================================
  //  Draw: road
  // ================================================================
  function drawRoad(dt, p) {
    const speed = getScrollSpeed(p);
    roadOffset  = (roadOffset + speed * dt) % 100;

    const W  = canvas.width;
    const roadTop = getRoadTop();
    const H  = getRoadHeight();
    const cx = W / 2;
    const rw = W * 0.66;

    // Road surface strip
    const sg = ctx.createLinearGradient(cx - rw / 2, 0, cx + rw / 2, 0);
    sg.addColorStop(0,    'rgba(4, 4, 14, 0)');
    sg.addColorStop(0.1,  'rgba(5, 6, 16, 0.62)');
    sg.addColorStop(0.9,  'rgba(5, 6, 16, 0.62)');
    sg.addColorStop(1,    'rgba(4, 4, 14, 0)');
    ctx.fillStyle = sg;
    ctx.fillRect(cx - rw / 2, roadTop, rw, H);

    // Edge lines
    const edgeA = lerp(0.28, 0.08, p);
    ctx.strokeStyle = `rgba(255,255,255,${edgeA})`;
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(cx - rw / 2 + 16, roadTop);   ctx.lineTo(cx - rw / 2 + 16, roadTop + H);
    ctx.moveTo(cx + rw / 2 - 16, roadTop);   ctx.lineTo(cx + rw / 2 - 16, roadTop + H);
    ctx.stroke();

    // Centre dashes
    ctx.strokeStyle    = `rgba(255,255,255,${lerp(0.22, 0.06, p)})`;
    ctx.lineWidth      = 2.5;
    ctx.setLineDash([60, 40]);
    ctx.lineDashOffset = -roadOffset;
    ctx.beginPath();
    ctx.moveTo(cx, roadTop);   ctx.lineTo(cx, roadTop + H);
    ctx.stroke();
    ctx.setLineDash([]);
  }


  // ================================================================
  //  Draw: gates
  // ================================================================
  function updateAndDrawGates(dt, p) {
    const speed   = getScrollSpeed(p);
    const playerY = canvas.height * CONFIG.PLAYER_Y_FRACTION;
    const roadTop = getRoadTop();

    for (let i = gates.length - 1; i >= 0; i--) {
      const g = gates[i];
      g.y += speed * dt;

      // Pass / miss detection (once per gate)
      if (!g.checked) {
        const gateMid = g.y + CONFIG.PILLAR_HEIGHT / 2;
        if (Math.abs(gateMid - playerY) <= CONFIG.PLAYER_RADIUS) {
          g.checked = true;
          const pL = player.x - CONFIG.PLAYER_RADIUS;
          const pR = player.x + CONFIG.PLAYER_RADIUS;
          const gL = g.x - g.gapWidth / 2;
          const gR = g.x + g.gapWidth / 2;

          if (pL >= gL && pR <= gR) {
            // Player passed through the gate
            const panRange = Math.max(1, g.panMaxX - g.panMinX);
            const normalized = ((g.x - g.panMinX) / panRange) * 2 - 1;
            const pan = Math.sign(normalized) * Math.pow(Math.abs(clamp(normalized, -1, 1)), CONFIG.PAN_CURVE_EXP);
            if (soundEnabled) playBell(pan, p);
            triggerHaptic();
            addStar(g.x);
          }
          // On miss: nothing happens (no punishment)
        }
      }

      if (g.y > canvas.height + CONFIG.PILLAR_HEIGHT + 60) { gates.splice(i, 1); continue; }

      if (g.y + CONFIG.PILLAR_HEIGHT < roadTop) continue;

      _drawGate(g, p);
    }
  }

  function _drawGate(g, p) {
    const gL = g.x - g.gapWidth / 2;
    const gR = g.x + g.gapWidth / 2;
    const leftPillarX = gL - CONFIG.PILLAR_WIDTH;
    const rightPillarX = gR;

    // Gate colour follows background phase
    let cr, cg, cb, ca;
    if (p < P1) {
      const t = p / P1;
      cr = 255; cg = Math.round(lerp(200, 160, t)); cb = Math.round(lerp(60, 80, t)); ca = 0.88;
    } else if (p < P2) {
      const t = (p - P1) / (P2 - P1);
      cr = Math.round(lerp(255, 100, t));
      cg = Math.round(lerp(160, 145, t));
      cb = Math.round(lerp(80,  255, t));
      ca = 0.78;
    } else {
      const t  = Math.min((p - P2) / (1 - P2), 1);
      cr = 90; cg = 115; cb = 215; ca = lerp(0.55, 0.28, t);
    }

    const color = `rgba(${cr},${cg},${cb},${ca})`;
    ctx.shadowBlur  = 12;
    ctx.shadowColor = color;
    ctx.fillStyle   = color;

    ctx.fillRect(leftPillarX, g.y, CONFIG.PILLAR_WIDTH, CONFIG.PILLAR_HEIGHT);
    ctx.fillRect(rightPillarX, g.y, CONFIG.PILLAR_WIDTH, CONFIG.PILLAR_HEIGHT);

    // Inner edge highlights
    ctx.shadowBlur  = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.62)';
    ctx.lineWidth   = 1.2;
    ctx.beginPath();
    ctx.moveTo(gL, g.y); ctx.lineTo(gL, g.y + CONFIG.PILLAR_HEIGHT);
    ctx.moveTo(gR, g.y); ctx.lineTo(gR, g.y + CONFIG.PILLAR_HEIGHT);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }


  // ================================================================
  //  Draw: player orb
  // ================================================================
  function drawPlayer(p) {
    const x = player.x;
    const y = canvas.height * CONFIG.PLAYER_Y_FRACTION;
    const r = CONFIG.PLAYER_RADIUS;

    // Colour interpolation across phases
    let cr, cg, cb;
    if (p < P1) {
      const t = p / P1;
      cr = Math.round(lerp(255, 110, t));
      cg = Math.round(lerp(210, 170, t));
      cb = Math.round(lerp(70,  255, t));
    } else {
      const t = Math.min((p - P1) / (1 - P1), 1);
      cr = Math.round(lerp(110, 80,  t));
      cg = Math.round(lerp(170, 100, t));
      cb = 255;
    }

    // Outer glow
    const og = ctx.createRadialGradient(x, y, 0, x, y, r * 2.6);
    og.addColorStop(0, `rgba(${cr},${cg},${cb},0.28)`);
    og.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = og;
    ctx.beginPath();
    ctx.arc(x, y, r * 2.6, 0, Math.PI * 2);
    ctx.fill();

    // Core orb
    const cg2 = ctx.createRadialGradient(x - r * 0.28, y - r * 0.28, r * 0.08, x, y, r);
    cg2.addColorStop(0,   'rgba(255,255,255,0.95)');
    cg2.addColorStop(0.4, `rgba(${cr},${cg},${cb},0.85)`);
    cg2.addColorStop(1,   `rgba(${cr},${cg},${cb},0.35)`);

    ctx.shadowBlur  = 22;
    ctx.shadowColor = `rgba(${cr},${cg},${cb},0.7)`;
    ctx.fillStyle   = cg2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }


  // ================================================================
  //  Main game loop
  // ================================================================
  function gameLoop(ts) {
    if (!running) return;
    if (!lastTimestamp) lastTimestamp = ts;

    const dt = Math.min((ts - lastTimestamp) / 1000, 0.05);  // cap at 50 ms
    lastTimestamp = ts;
    timeElapsed  += dt;

    const p = getProgress();

    // Spawn gates
    timeSinceLastGate += dt;
    if (timeSinceLastGate >= getGateInterval(p)) {
      spawnGate(p);
      timeSinceLastGate = 0;
    }

    // Update audio filter
    if (soundEnabled && rainFilter) updateRainFilter(p);

    // Render
    drawSky(dt, p);
    drawRoad(dt, p);
    updateAndDrawGates(dt, p);
    drawPlayer(p);

    requestAnimationFrame(gameLoop);
  }


  // ================================================================
  //  Init
  // ================================================================
  resizeCanvas();
  startNewConstellation();

  </script>
</body>
